<!DOCTYPE html>
<html>

<head>
    <title>Pizza Palace - Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/restaurant.css') }}">
    <style>
        .menu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .menu-item {
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .menu-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .price {
            color: #4CAF50;
            font-size: 18px;
            font-weight: bold;
        }

        .order-btn {
            background: #ff6a00;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .rating-box {
            margin-top: 40px;
            padding: 20px;
            background: #ffe6d5;
            font-size: 22px;
            text-align: center;
            font-weight: bold;
            border-radius: 10px;
        }
    </style>
</head>

<body class="restaurant-body">
    <nav class="navbar">
        <h2>FoodAI</h2>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/businesses">Restaurants</a></li>
            <li><a href="/recommend">Recommendations</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>
    <div style="text-align: center; padding: 40px;">
        <h1>Pizza Palace 🍕</h1>
        <p>Delicious thick crust pizzas made with love</p>
        <h2>Menu</h2>
        <div class="menu-container">
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=500" alt="Margherita">
                <h3>Margherita Pizza</h3>
                <p class="price">Average Price: ₹249</p>
                <button class="order-btn">Order Now</button>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1628840042765-356cda07504e?w=500" alt="Pepperoni">
                <h3>Pepperoni Feast</h3>
                <p class="price">Average Price: ₹399</p>
                <button class="order-btn">Order Now</button>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1573140247632-f8fd74997d5c?w=500" alt="Garlic Bread">
                <h3>Cheese Garlic Bread</h3>
                <p class="price">Average Price: ₹149</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>
        <div class="rating-box">
            Overall Restaurant Rating: 4.6 ⭐⭐⭐⭐⭐
        </div>
    </div>
</body>

</html>
